<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeVault Privacy Policy</title>
<script>
  var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  var code = lang.substring(0, 2);
  var map = {ko:'ko',zh:'zh',hi:'hi',es:'es',ar:'ar',fr:'fr',bn:'bn',pt:'pt',ru:'ru',ja:'ja'};
  if (lang.startsWith('zh')) code = 'zh';
  window.location.replace((map[code] || 'en') + '.html');
</script>
</head>
<body>
<p>Redirecting... <a href="en.html">English</a></p>
</body>
</html>
