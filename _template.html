<!-- shared CSS template - not a deployable file -->
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#070F1E; color:#E8EEF7; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; line-height:1.7; }
.container { max-width:800px; margin:0 auto; padding:24px 20px; }
header { text-align:center; padding:40px 0 32px; border-bottom:1px solid #1E3459; margin-bottom:32px; }
header .logo { font-size:40px; margin-bottom:12px; }
header h1 { color:#C9A84C; font-size:28px; font-weight:900; letter-spacing:1px; }
header p { color:#8FA3BF; font-size:14px; margin-top:6px; }
nav { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:32px; justify-content:center; }
nav a { color:#8FA3BF; text-decoration:none; font-size:11px; padding:4px 10px; border:1px solid #1E3459; border-radius:12px; }
nav a:hover,nav a.active { color:#C9A84C; border-color:#C9A84C; }
.card { background:#0F1F3D; border:1px solid #1E3459; border-radius:14px; padding:20px; margin-bottom:16px; }
.card h2 { color:#C9A84C; font-size:15px; font-weight:800; margin-bottom:10px; }
.card p,.card li { color:#8FA3BF; font-size:14px; }
.card ul { padding-left:20px; }
.card li { margin-bottom:4px; }
footer { text-align:center; padding:32px 0; border-top:1px solid #1E3459; margin-top:32px; }
footer p { color:#8FA3BF; font-size:12px; }
footer a { color:#C9A84C; }
@media(max-width:480px){ header h1{font-size:22px} .card{padding:16px} }
</style>
